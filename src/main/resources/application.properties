# ─────────────────────────────────────────────────────────────────────────────
# application.properties — ไฟล์ตั้งค่าหลักของ Spring Boot
# ─────────────────────────────────────────────────────────────────────────────

# Port ที่ Server จะรันอยู่ (default = 8080)
# เปลี่ยนได้ถ้า port 8080 ถูกใช้งานอยู่แล้ว เช่น server.port=9090
server.port=8080

# ชื่อแอปพลิเคชัน (ปรากฏใน log)
spring.application.name=myapp-6430212592

# ─── Logging ─────────────────────────────────────────────────────────────────
# ระดับ log: TRACE < DEBUG < INFO < WARN < ERROR
# ค่า default คือ INFO (แสดงเฉพาะ INFO ขึ้นไป)
logging.level.root=INFO

# เปิด DEBUG เฉพาะ package ของโปรเจกต์เรา (comment ออกถ้าไม่ต้องการ)
# logging.level.com.example.lab03=DEBUG

# ─── DevTools ────────────────────────────────────────────────────────────────
# auto-restart เมื่อตรวจพบการเปลี่ยนแปลงไฟล์ (ทำงานเฉพาะตอน dev)
spring.devtools.restart.enabled=true
